name: Hoyolab Daily Check-in

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron runs in UTC. These are roughly morning, noon, and evening in Europe/Paris.
    - cron: "15 7 * * *"
    # - cron: "15 10 * * *"
    - cron: "15 16 * * *"

permissions:
  contents: read

concurrency:
  group: hoyolab-checkin
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Restore Hoyolab sessions
        shell: bash
        env:
          HOYOLAB_ACCOUNTS_B64: ${{ secrets.HOYOLAB_ACCOUNTS_B64 }}
        run: |
          if [ -z "$HOYOLAB_ACCOUNTS_B64" ]; then
            echo "Missing GitHub secret HOYOLAB_ACCOUNTS_B64"
            exit 1
          fi
          mkdir -p .auth/accounts
          printf '%s' "$HOYOLAB_ACCOUNTS_B64" | base64 -d | gunzip | node -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync(0, "utf8"));
            for (const acc of data.accounts) {
              fs.writeFileSync(`.auth/accounts/${acc.id}.json`, acc.state);
            }
            console.log(`Restored ${data.accounts.length} account(s).`);
          '

      - name: Run Hoyolab check-in for all accounts
        env:
          HEADLESS: "true"
          PROOF_DIR: output/proofs
        run: npm run checkin:all

      - name: Upload proof screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hoyolab-checkin-${{ github.run_id }}
          path: output/proofs/**/*.png
          if-no-files-found: warn
          retention-days: 30
